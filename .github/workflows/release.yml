name: Release StatsExtended

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build zip
        run: git archive -o FS25_StatsExtended_update.zip HEAD

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            FS25_StatsExtended_update.zip \
            --title "${{ github.ref_name }}" \
            --generate-notes
